    - u-g
    - u-r
    - u-i
    - u-z
    - u-y
    - g-r
    - g-i
    - g-z
    - g-y
    - r-i
    - r-z
    - r-y
    - i-z
    - i-y
    - z-y
  modes: [fcolors]
