id: dp1_treecorr16_legacy
catalog: configs/catalogs/dp1_processed_legacy.yaml
selection:
  foreground_z: [0.2, 0.5]
  background_z: [0.7, 1.4]
  shared_query: z_phot_err < 0.2 and z_phot_diff < 0.2
  pixel_depth_cuts:
    pixel_col: pixel
    depth_template: depth5_{band}
    window:
      bands: [u, g, r, i, z, y]
      min: 20.0
      max: 30.0
    min_occupancy: 30
    min_depth:
      r: 24.752574989159953
    quantile_min:
      bands: [u, g, i, z, y]
      quantile: 0.05
      unique: true
  snr_min:
    flux_template: cmodel_flux_{band}
    fluxerr_template: cmodel_fluxerr_{band}
    bands:
      u: 1
      g: 5
      r: 10
      i: 5
      z: 5
      y: 1
  blendedness_max:
    column: blendedness_i
    value: 0.42
  magnitude_limits:
    - band: r
      min: 18.0
      max: 24.0
      flux_col: cmodel_flux_r
  foreground_query: >-
    photoz_sigma_fzboost < 0.1 and photoz_sigma_lephare < 0.1
    and z_phot_diff < 0.1 * (1 + z_phot)
  background_query: >-
    photoz_sigma_fzboost < 0.1 and photoz_sigma_lephare < 0.1
    and z_phot_diff < 0.1 * (1 + z_phot)
footprint:
  enabled: true
  columns: [ra, dec, field, pixel, jackknife_region]
jackknife:
  regions_per_field: 3
cleaning:
  foreground:
    enabled: false
  background:
    enabled: true
    legacy_photometry:
      enabled: true
      colors: [g-r, r-i, i-z, g-i]
      modes: [mcolors]
      columns:
        - flux_g
        - flux_r
        - flux_i
        - flux_z
        - mcolor_g_r
        - mcolor_r_i
        - mcolor_i_z
        - mcolor_g_i
      ztrends: true
      outliers: true
      redshift_bin_width: 0.04
      random_state: 42
