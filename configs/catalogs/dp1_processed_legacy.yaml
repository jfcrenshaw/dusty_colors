id: dp1_processed_legacy
adapter: dp1
primary_source: processed
sources:
  processed:
    path: data/dp1_catalog_processed.parquet
bands: [u, g, r, i, z, y]
photometry: flux
flux_type: gaap1p0
photoz:
  combine:
    estimates:
      - z: fzboost_z_mode
        err_low: fzboost_z_err68_low
        err_high: fzboost_z_err68_high
      - z: lephare_z_mode
        err_low: lephare_z_err68_low
        err_high: lephare_z_err68_high
    diff_col: z_phot_diff
extinction:
  enabled: false
footprint:
  nside: 1024
