id: dp1_pai_blanton2024
adapter: dp1
primary_source: objects
sources:
  objects:
    path: data/dp1_catalog_raw.fits
  photoz:
    path: data/dp1_photoz_no_mags.parquet
    join:
      left_key: objectID
      right_key: objectId
      how: inner
  specz:
    path: data/comcam_ecdfs_crossmatched_catalog_20250618.parquet
    query: confidence >= 0.95
    finite: [redshift]
    columns: [objectId, redshift, confidence, type, source]
    join:
      left_key: objectID
      right_key: objectId
      how: left
bands: [g, r, i, z]
photometry: flux
flux_type: gaap1p0
photoz:
  combine:
    estimates:
      - z: fzboost_z_mode
        err_low: fzboost_z_err68_low
        err_high: fzboost_z_err68_high
      - z: lephare_z_mode
        err_low: lephare_z_err68_low
        err_high: lephare_z_err68_high
    diff_col: z_phot_diff
extinction:
  enabled: true
  ebv_column: ebv
  bands: [u, g, r, i, z, y]
  coefficients:
    u: 4.81
    g: 3.64
    r: 2.70
    i: 2.06
    z: 1.58
    y: 1.31
enrichments:
  kcorrect:
    enabled: true
    model: data/kcorrect_broad.fits
    response_bands: [y, r, g, u, z, i]
    absmag_bands: [u, g, r, i, z, y]
    max_redshift: 0.5
    error_floor:
      u: 0.05
      y: 0.05
    stellar_mass_col: stellar_mass_log
  halo_mass:
    enabled: true
    stellar_mass_col: stellar_mass_log
    stellar_mass_is_log: true
    halo_mass_col: halo_mass_log
    r200_col: r200_mpc
footprint:
  nside: 1024
  fields:
    ECDFS: {ra: 53.13, dec: -28.10}
    EDFS: {ra: 59.10, dec: -48.73}
    "Rubin SV 95 -25": {ra: 95.00, dec: -25.00}
jackknife:
  regions_per_field: 3
